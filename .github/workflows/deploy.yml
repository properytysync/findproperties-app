name: Deploy FindProperties (Multi-Env)

on:
  push:
    branches: ["main", "develop"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build React App
        run: |
          npm install
          # THE MAGIC FIX: Create the .env.production file so Vite knows the API path!
          echo "VITE_API_BASE=/api/v1" > .env.production
          npm run build

      - name: Determine Target Environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_DIR=/var/www/prod/" >> $GITHUB_OUTPUT
            echo "ENV_NAME=PRODUCTION" >> $GITHUB_OUTPUT
          else
            echo "TARGET_DIR=/var/www/staging/" >> $GITHUB_OUTPUT
            echo "ENV_NAME=STAGING" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to ${{ steps.env.outputs.ENV_NAME }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist"
          target: ${{ steps.env.outputs.TARGET_DIR }}
          strip_components: 1
          overwrite: true
          debug: true
          insecure: true